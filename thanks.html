<title>お問い合わせありがとうございました｜k-therapist</title>
<meta name="description" content="お問い合わせを受け付けました。k-therapistより通常2〜3営業日以内にご返信します。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#1A365D;--navy-deep:#12263F;--teal:#2C5282;--bg:#F8F8F8;--ink:#1A202C;--muted:#6B7280;--line:#DBDBDB;--font-display:'Shippori Mincho',serif;--font-body:'Zen Kaku Gothic New',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--font-body);background:var(--bg);color:var(--ink);line-height:2}.header{background:var(--navy-deep)}.header-inner{max-width:1120px;height:64px;margin:0 auto;padding:0 24px;display:flex;align-items:center}.brand{font-family:var(--font-display);font-weight:700;font-size:1.15rem;color:#fff;letter-spacing:.08em;text-decoration:none}main{min-height:calc(100vh - 150px);display:grid;place-items:center;padding:80px 24px}.card{width:min(100%,680px);background:#fff;border:1px solid var(--line);padding:56px 52px}.eyebrow{color:var(--teal);font-size:.78rem;letter-spacing:.2em;margin-bottom:16px}.eyebrow::before{content:"";display:inline-block;width:22px;height:1px;margin:0 10px 5px 0;background:var(--teal)}h1{font-family:var(--font-display);font-size:clamp(1.8rem,4vw,2.6rem);line-height:1.55;letter-spacing:.08em;color:var(--navy);margin-bottom:24px}p{font-size:.95rem;color:var(--muted)}.btn{display:inline-block;margin-top:34px;padding:12px 26px;background:var(--navy);color:#fff;text-decoration:none;font-size:.85rem;font-weight:700;letter-spacing:.1em;border-radius:3px}.btn:hover{background:var(--teal)}footer{background:var(--navy-deep);padding:28px 24px;color:#C9CBD4;text-align:center;font-size:.72rem;letter-spacing:.1em}@media(max-width:600px){main{padding:48px 20px}.card{padding:40px 26px}}
</style>
</head>
<body>
<header class="header"><div class="header-inner"><a class="brand" href="index.html">k-therapist</a></div></header>
<main>
  <section class="card" aria-labelledby="thanks-title">
    <p class="eyebrow">CONTACT</p>
    <h1 id="thanks-title">お問い合わせを<br>受け付けました</h1>
    <p>お問い合わせありがとうございます。内容を確認のうえ、通常2〜3営業日以内にご返信します。</p>
    <a class="btn" href="index.html">トップページへ戻る</a>
  </section>
</main>
<footer>© 2026 k-therapist</footer>
</body>
</html>
